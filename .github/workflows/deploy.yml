name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: ${{ secrets.SERVER_PATH }}
          rm: true

      - name: Execute remote commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            SERVER_NAME="${{ secrets.SERVER_NAME }}"
            if [ -z "$SERVER_NAME" ]; then
              SERVER_NAME="_"
            fi

            cd "${{ secrets.SERVER_PATH }}"
            chmod +x scripts/*.sh

            bash scripts/setup.sh

            {
              printf 'DJANGO_DEBUG=False\n'
              printf 'DJANGO_ALLOWED_HOSTS=%q\n' "${{ secrets.DJANGO_ALLOWED_HOSTS }}"
              printf 'DJANGO_CSRF_TRUSTED_ORIGINS=%q\n' "${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}"
              printf 'DJANGO_SECRET_KEY=%q\n' "${{ secrets.DJANGO_SECRET_KEY }}"
            } > .env.deploy

            set -a
            . ./.env.deploy
            set +a

            . env/bin/activate

            cd frontend
            npm run build
            cd ../stock_portfolio
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            cd ..

            if [ -n "${{ secrets.DJANGO_SERVICE_NAME }}" ]; then
              sed \
                -e "s|__SERVER_PATH__|${{ secrets.SERVER_PATH }}|g" \
                -e "s|__SERVER_USER__|${{ secrets.SERVER_USER }}|g" \
                deploy/systemd/stock_portfolio.service | sudo tee "/etc/systemd/system/${{ secrets.DJANGO_SERVICE_NAME }}.service" > /dev/null

              sudo systemctl daemon-reload
              sudo systemctl enable "${{ secrets.DJANGO_SERVICE_NAME }}.service"
              sudo systemctl restart "${{ secrets.DJANGO_SERVICE_NAME }}.service"
            else
              echo "DJANGO_SERVICE_NAME secret not set. Skipping service restart."
            fi

            if [ -n "${{ secrets.NGINX_SITE_NAME }}" ]; then
              sed \
                -e "s|__SERVER_PATH__|${{ secrets.SERVER_PATH }}|g" \
                -e "s|__SERVER_NAME__|$SERVER_NAME|g" \
                deploy/nginx/stock_portfolio.conf | sudo tee "/etc/nginx/sites-available/${{ secrets.NGINX_SITE_NAME }}" > /dev/null

              sudo ln -sfn "/etc/nginx/sites-available/${{ secrets.NGINX_SITE_NAME }}" "/etc/nginx/sites-enabled/${{ secrets.NGINX_SITE_NAME }}"
              sudo nginx -t
              sudo systemctl reload nginx
            else
              echo "NGINX_SITE_NAME secret not set. Skipping Nginx update."
            fi

            echo "Deployment finished on server."